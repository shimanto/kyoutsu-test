<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Favicon: Minimal 3x3 heatmap grid mark -->
  <!-- Works at 16x16 and 32x32 -->
  <rect width="32" height="32" rx="6" fill="#030712"/>
  <!-- Row 1 -->
  <rect x="3"  y="3"  width="8" height="7" rx="1.5" fill="#dc2626"/>
  <rect x="12" y="3"  width="8" height="7" rx="1.5" fill="#f87171"/>
  <rect x="21" y="3"  width="8" height="7" rx="1.5" fill="#fde68a"/>
  <!-- Row 2 -->
  <rect x="3"  y="11.5" width="8" height="7" rx="1.5" fill="#fca5a5"/>
  <rect x="12" y="11.5" width="8" height="7" rx="1.5" fill="#bef264"/>
  <rect x="21" y="11.5" width="8" height="7" rx="1.5" fill="#4ade80"/>
  <!-- Row 3 -->
  <rect x="3"  y="20" width="8" height="7" rx="1.5" fill="#86efac"/>
  <rect x="12" y="20" width="8" height="7" rx="1.5" fill="#22c55e"/>
  <rect x="21" y="20" width="8" height="7" rx="1.5" fill="#15803d"/>
  <!-- Bottom accent -->
  <rect x="3" y="28.5" width="26" height="1.5" rx="0.75" fill="#22c55e"/>
</svg>

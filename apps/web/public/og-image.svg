<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative heatmap blocks (left side) -->
  <g transform="translate(60, 80)" opacity="0.85">
    <rect x="0" y="0" width="140" height="90" rx="10" fill="#dc2626"/>
    <rect x="150" y="0" width="100" height="90" rx="10" fill="#f87171"/>
    <rect x="260" y="0" width="120" height="90" rx="10" fill="#22c55e"/>
    <rect x="0" y="100" width="100" height="80" rx="10" fill="#4ade80"/>
    <rect x="110" y="100" width="140" height="80" rx="10" fill="#fde68a"/>
    <rect x="260" y="100" width="120" height="80" rx="10" fill="#bef264"/>
    <rect x="0" y="190" width="170" height="70" rx="10" fill="#fca5a5"/>
    <rect x="180" y="190" width="80" height="70" rx="10" fill="#22c55e"/>
    <rect x="270" y="190" width="110" height="70" rx="10" fill="#ef4444"/>
    <rect x="0" y="270" width="120" height="85" rx="10" fill="#22c55e"/>
    <rect x="130" y="270" width="110" height="85" rx="10" fill="#f87171"/>
    <rect x="250" y="270" width="130" height="85" rx="10" fill="#4ade80"/>
  </g>
  <!-- Main text area (right side) -->
  <text x="700" y="220" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="96" font-weight="900" fill="white" letter-spacing="6">大学物語</text>
  <text x="700" y="290" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="32" fill="#9ca3af">共通テスト攻略プラットフォーム</text>
  <!-- Feature highlights -->
  <g transform="translate(500, 340)" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="22" fill="#d1d5db">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#22c55e"/>
    <text x="22" y="12">忘却曲線 × SM-2アルゴリズム</text>
    <rect x="0" y="40" width="12" height="12" rx="3" fill="#f97316"/>
    <text x="22" y="52">弱点自動検出 × 重点ドリル</text>
    <rect x="0" y="80" width="12" height="12" rx="3" fill="#3b82f6"/>
    <text x="22" y="92">S&amp;P500スタイル学習マップ</text>
  </g>
  <!-- Bottom accent -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
  <!-- URL -->
  <text x="1140" y="590" text-anchor="end" font-family="monospace" font-size="16" fill="#6b7280">daigaku-monogatari.pages.dev</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ====== Left: Logo Mark (3x4 Heatmap Grid) — Same as icon.svg ====== -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <!-- Row 1: Weak (red) -->
    <rect x="0"   y="0"  width="145" height="55" rx="8" fill="#dc2626" opacity="0.92"/>
    <rect x="155" y="0"  width="85"  height="55" rx="8" fill="#ef4444" opacity="0.92"/>
    <rect x="250" y="0"  width="120" height="55" rx="8" fill="#f87171" opacity="0.92"/>

    <!-- Row 2: Growing (red-yellow) -->
    <rect x="0"   y="65" width="100" height="55" rx="8" fill="#fca5a5" opacity="0.92"/>
    <rect x="110" y="65" width="130" height="55" rx="8" fill="#fde68a" opacity="0.92"/>
    <rect x="250" y="65" width="120" height="55" rx="8" fill="#fbbf24" opacity="0.92"/>

    <!-- Row 3: Advancing (yellow-green) -->
    <rect x="0"   y="130" width="120" height="55" rx="8" fill="#bef264" opacity="0.92"/>
    <rect x="130" y="130" width="90"  height="55" rx="8" fill="#86efac" opacity="0.92"/>
    <rect x="230" y="130" width="140" height="55" rx="8" fill="#4ade80" opacity="0.92"/>

    <!-- Row 4: Mastered (green) -->
    <rect x="0"   y="195" width="85"  height="55" rx="8" fill="#22c55e" opacity="0.92"/>
    <rect x="95"  y="195" width="145" height="55" rx="8" fill="#16a34a" opacity="0.92"/>
    <rect x="250" y="195" width="120" height="55" rx="8" fill="#15803d" opacity="0.92"/>

    <!-- Progress arrow overlay -->
    <text x="185" y="175" text-anchor="middle"
          font-family="sans-serif" font-size="28" fill="white" opacity="0.15"
          letter-spacing="4">&#x25BC; &#x25BC; &#x25BC;</text>
  </g>

  <!-- ====== Right: Brand Text ====== -->
  <!-- Brand name -->
  <text x="770" y="195" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"
        font-size="92" font-weight="900" fill="white" letter-spacing="8">大学物語</text>

  <!-- Subtitle -->
  <text x="770" y="245" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"
        font-size="24" fill="#6b7280" letter-spacing="3">共通テスト攻略プラットフォーム</text>

  <!-- Divider -->
  <rect x="620" y="270" width="300" height="2" rx="1" fill="#1e293b"/>

  <!-- Tagline -->
  <text x="770" y="315" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"
        font-size="30" font-weight="700" fill="#22c55e" letter-spacing="2">弱点が見える。だから伸びる。</text>

  <!-- Feature highlights -->
  <g transform="translate(620, 360)"
     font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"
     font-size="19" fill="#9ca3af">
    <rect x="0" y="0"  width="10" height="10" rx="2" fill="#22c55e"/>
    <text x="18" y="11">忘却曲線 (SM-2) で最適復習</text>
    <rect x="0" y="32" width="10" height="10" rx="2" fill="#f97316"/>
    <text x="18" y="43">弱点自動検出 &amp; 重点ドリル</text>
    <rect x="0" y="64" width="10" height="10" rx="2" fill="#3b82f6"/>
    <text x="18" y="75">全9科目 900点 ヒートマップ可視化</text>
  </g>

  <!-- ====== Bottom Bar ====== -->
  <!-- Accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
  <!-- Free badge -->
  <rect x="60" y="530" width="72" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="96" y="549" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="14" font-weight="700" fill="#22c55e">無料</text>
  <!-- URL -->
  <text x="1140" y="590" text-anchor="end"
        font-family="'SF Mono','Cascadia Code',monospace" font-size="15" fill="#4b5563">
    daigaku-monogatari.pages.dev</text>
</svg>

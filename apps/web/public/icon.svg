<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Heatmap blocks (signature S&P500 style) -->
  <g transform="translate(40, 56)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#dc2626" opacity="0.9"/>
    <rect x="128" y="0" width="80" height="80" rx="8" fill="#f87171" opacity="0.9"/>
    <rect x="216" y="0" width="100" height="80" rx="8" fill="#fde68a" opacity="0.9"/>
    <rect x="324" y="0" width="108" height="80" rx="8" fill="#4ade80" opacity="0.9"/>
    <!-- Row 2 -->
    <rect x="0" y="88" width="80" height="70" rx="8" fill="#22c55e" opacity="0.9"/>
    <rect x="88" y="88" width="120" height="70" rx="8" fill="#fca5a5" opacity="0.9"/>
    <rect x="216" y="88" width="70" height="70" rx="8" fill="#bef264" opacity="0.9"/>
    <rect x="294" y="88" width="138" height="70" rx="8" fill="#22c55e" opacity="0.9"/>
    <!-- Row 3 -->
    <rect x="0" y="166" width="140" height="60" rx="8" fill="#4ade80" opacity="0.9"/>
    <rect x="148" y="166" width="90" height="60" rx="8" fill="#ef4444" opacity="0.9"/>
    <rect x="246" y="166" width="186" height="60" rx="8" fill="#fde68a" opacity="0.9"/>
  </g>
  <!-- "大学物語" text -->
  <text x="256" y="340" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="4">大学物語</text>
  <!-- Tagline -->
  <text x="256" y="390" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="24" fill="#9ca3af">共通テスト攻略マップ</text>
  <!-- Bottom accent bar -->
  <rect x="40" y="430" width="432" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
</svg>
